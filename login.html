<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SpiceLane – Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<style>
:root{
  --saffron:#FF6B00;--saffron-light:#FF9240;
  --deep:#1A0A00;--cream:#FFF8F0;--card-bg:#FFFFFF;
  --text:#2D1800;--muted:#8A6A50;--border:#F0DBC8;
  --success:#2ECC71;--error:#E74C3C;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'DM Sans',sans-serif;
  min-height:100vh;display:flex;
  background:var(--cream);
  overflow:hidden;
}
/* Left panel */
.left-panel{
  flex:1;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  background:linear-gradient(145deg,var(--deep) 0%,#3D1500 60%,#6B2800 100%);
}
.left-panel::before{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23FF6B00' fill-opacity='0.07'%3E%3Ccircle cx='30' cy='30' r='4'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.left-content{
  position:relative;z-index:2;text-align:center;padding:48px;
  animation:fadeIn 0.8s ease both;
}
.left-emoji{
  font-size:5rem;display:block;margin-bottom:24px;
  animation:bounce 2s infinite;
}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
.left-title{
  font-family:'Playfair Display',serif;
  font-size:2.8rem;font-weight:900;color:#fff;
  line-height:1.15;margin-bottom:16px;
}
.left-title span{color:var(--saffron);}
.left-sub{color:rgba(255,255,255,0.65);font-size:1.05rem;line-height:1.7;max-width:320px;}
.dishes-float{
  margin-top:40px;display:flex;gap:14px;justify-content:center;flex-wrap:wrap;
}
.dish-chip{
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);
  border-radius:50px;padding:8px 18px;
  color:rgba(255,255,255,0.8);font-size:0.88rem;font-weight:500;
  display:flex;align-items:center;gap:7px;
  animation:fadeIn 1s ease both;
}
.dish-chip:nth-child(1){animation-delay:0.3s;}
.dish-chip:nth-child(2){animation-delay:0.5s;}
.dish-chip:nth-child(3){animation-delay:0.7s;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
/* Right panel */
.right-panel{
  width:480px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  padding:40px 48px;background:var(--card-bg);
  box-shadow:-20px 0 60px rgba(26,10,0,0.1);
}
.form-area{width:100%;max-width:360px;animation:slideRight 0.6s cubic-bezier(0.22,1,0.36,1) both;}
@keyframes slideRight{from{opacity:0;transform:translateX(30px);}to{opacity:1;transform:translateX(0);}}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:36px;}
.brand-icon{
  width:44px;height:44px;
  background:linear-gradient(135deg,var(--saffron),var(--saffron-light));
  border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:22px;box-shadow:0 4px 14px rgba(255,107,0,0.35);
}
.brand-name{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:900;color:var(--deep);}
.brand-name span{color:var(--saffron);}
h2{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--text);margin-bottom:6px;}
.subtitle{color:var(--muted);font-size:0.95rem;margin-bottom:32px;}
.subtitle a{color:var(--saffron);font-weight:600;text-decoration:none;}
.form-group{position:relative;margin-bottom:18px;}
.form-label{font-size:0.82rem;font-weight:600;color:var(--text);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:7px;display:block;}
.input-wrap{position:relative;}
.input-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:1.05rem;pointer-events:none;transition:color 0.2s;}
.form-control{
  width:100%;padding:13px 44px 13px 44px;
  border:2px solid var(--border);border-radius:12px;
  font-family:'DM Sans',sans-serif;font-size:0.95rem;color:var(--text);
  background:#FAFAFA;outline:none;transition:all 0.2s;
}
.form-control:focus{border-color:var(--saffron);background:#fff;box-shadow:0 0 0 4px rgba(255,107,0,0.1);}
.form-control.is-valid{border-color:var(--success);}
.input-wrap:focus-within .input-icon{color:var(--saffron);}
.toggle-pass{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;transition:color 0.2s;}
.toggle-pass:hover{color:var(--saffron);}
.btn-primary-custom{
  width:100%;padding:15px;
  background:linear-gradient(135deg,var(--saffron),var(--saffron-light));
  border:none;border-radius:12px;
  font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;
  color:#fff;letter-spacing:0.3px;cursor:pointer;
  box-shadow:0 6px 20px rgba(255,107,0,0.35);
  transition:transform 0.15s,box-shadow 0.15s;
  position:relative;overflow:hidden;
}
.btn-primary-custom::after{content:'';position:absolute;inset:0;background:linear-gradient(rgba(255,255,255,0.15),transparent);}
.btn-primary-custom:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(255,107,0,0.4);}
.btn-primary-custom:active{transform:translateY(0);}
.btn-primary-custom:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.divider{display:flex;align-items:center;gap:12px;margin:22px 0;color:var(--muted);font-size:0.85rem;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.social-btn{
  width:100%;padding:12px;border:2px solid var(--border);border-radius:12px;
  background:#fff;font-family:'DM Sans',sans-serif;font-size:0.92rem;font-weight:500;
  color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
  transition:border-color 0.2s,background 0.2s;
}
.social-btn:hover{border-color:var(--saffron);background:var(--cream);}

</style>
</head>
<body>
<!-- Left Decorative Panel -->
<div class="left-panel">
  <div class="left-content">
    <span class="left-emoji">🍜</span>
    <h1 class="left-title">Flavours of<br/><span>India & Beyond</span></h1>
    <p class="left-sub">From crispy dosas to aromatic biryanis — your favourite food, delivered hot to your door.</p>
    <div class="dishes-float">
      <div class="dish-chip">🫓 North Indian</div>
      <div class="dish-chip">🍚 South Indian</div>
      <div class="dish-chip">🥡 Chinese</div>
    </div>
  </div>
</div>

<!-- Right Form Panel -->
<div class="right-panel">
  <div class="form-area">
    <div class="brand">
      <div class="brand-icon">🍛</div>
      <div class="brand-name">Spice<span>Lane</span></div>
    </div>

    <h2>Welcome Back</h2>
    <p class="subtitle">New here? <a href="signup.html">Create an account</a></p>

    <form id="loginForm" novalidate>
      <!-- Email -->
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="input-wrap">
          <i class="bi bi-envelope input-icon"></i>
          <input type="email" class="form-control" id="email" placeholder="you@example.com" autocomplete="email"/>
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <i class="bi bi-lock input-icon"></i>
          <input type="password" class="form-control" id="password" placeholder="Your password"/>
          <button type="button" class="toggle-pass" id="togglePass"><i class="bi bi-eye"></i></button>
        </div>
      </div>
      <button type="submit" class="btn-primary-custom" id="submitBtn">
        Sign In &nbsp;<i class="bi bi-arrow-right-circle-fill"></i>
      </button>
    </form>

</div>


<script>


document.getElementById('loginForm').addEventListener('submit', function(e){
  e.preventDefault(); // stop page reload

  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('password').value;

    // Redirect to another page
    setTimeout(()=>{
      window.location.href = "main.html"; 
    }, 1000);
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
