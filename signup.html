<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SpiceLane – Sign Up</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<style>
:root{
  --saffron:#FF6B00; --saffron-light:#FF9240;
  --deep:#1A0A00; --cream:#FFF8F0;
  --text:#2D1800; --muted:#8A6A50;
  --border:#F0DBC8; --success:#2ECC71; --error:#E74C3C;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--cream);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px 16px;
  background-image:
    radial-gradient(ellipse 60% 50% at 80% 10%, rgba(255,107,0,0.10) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 10% 90%, rgba(255,146,64,0.08) 0%, transparent 55%);
}

/* Card */
.card{
  width:100%; max-width:460px;
  background:#fff;
  border-radius:24px;
  padding:40px 36px;
  box-shadow:0 20px 60px rgba(26,10,0,0.12);
  animation:up 0.5s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes up{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}

/* Brand */
.brand{display:flex;align-items:center;gap:10px;margin-bottom:24px;}
.brand-icon{
  width:40px;height:40px;border-radius:10px;
  background:linear-gradient(135deg,var(--saffron),var(--saffron-light));
  display:flex;align-items:center;justify-content:center;font-size:20px;
  box-shadow:0 3px 10px rgba(255,107,0,0.3);
}
.brand-name{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:900;color:var(--deep);}
.brand-name span{color:var(--saffron);}

h2{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;color:var(--text);margin-bottom:4px;}
.sub{font-size:0.9rem;color:var(--muted);margin-bottom:24px;}
.sub a{color:var(--saffron);font-weight:600;text-decoration:none;}

/* Fields */
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fg{margin-bottom:14px;}
label{font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text);display:block;margin-bottom:5px;}
.iw{position:relative;}
.iw i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:0.95rem;pointer-events:none;}
input{
  width:100%;padding:11px 12px 11px 38px;
  border:2px solid var(--border);border-radius:11px;
  font-family:'DM Sans',sans-serif;font-size:0.9rem;color:var(--text);
  background:#FAFAFA;outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
}
input:focus{border-color:var(--saffron);background:#fff;box-shadow:0 0 0 3px rgba(255,107,0,0.10);}
input.ok{border-color:var(--success);}
.iw:focus-within i{color:var(--saffron);}
.eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;}
.eye:hover{color:var(--saffron);}


/* Checkbox */
.chk{display:flex;align-items:flex-start;gap:8px;margin-bottom:18px;}
.chk input{width:16px;height:16px;accent-color:var(--saffron);flex-shrink:0;margin-top:2px;}
.chk label{font-size:0.84rem;color:var(--muted);cursor:pointer;line-height:1.5;text-transform:none;letter-spacing:0;}
.chk label a{color:var(--saffron);font-weight:600;text-decoration:none;}

/* Buttons */
.btn-main{
  width:100%;padding:13px;border:none;border-radius:11px;
  background:linear-gradient(135deg,var(--saffron),var(--saffron-light));
  color:#fff;font-family:'DM Sans',sans-serif;font-size:0.97rem;font-weight:700;
  cursor:pointer;box-shadow:0 5px 18px rgba(255,107,0,0.32);
  transition:transform 0.15s,box-shadow 0.15s,opacity 0.2s;
}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,107,0,0.4);}
.btn-main:disabled{opacity:0.6;cursor:not-allowed;transform:none;}



/* Toast */
.toast{
  position:fixed;top:20px;right:20px;z-index:9999;
  background:var(--success);color:#fff;
  padding:12px 20px;border-radius:11px;font-weight:600;font-size:0.9rem;
  box-shadow:0 6px 20px rgba(0,0,0,0.12);
  display:flex;align-items:center;gap:8px;
  transform:translateX(120%);transition:transform 0.4s cubic-bezier(0.22,1,0.36,1);
}
.toast.show{transform:translateX(0);}

@media(max-width:480px){
  .card{padding:28px 20px;}
  .row2{grid-template-columns:1fr;}
  h2{font-size:1.5rem;}
}
</style>
</head>
<body>

<div class="card">
  <!-- Brand -->
  <div class="brand">
    <div class="brand-icon">🍛</div>
    <div class="brand-name">Spice<span>Lane</span></div>
  </div>

  <h2>Create Account</h2>
  <p class="sub">Already have an account? <a href="login.html">Sign in</a></p>

  <form id="signupForm" novalidate>

    <!-- Name row -->
    <div class="row2">
      <div class="fg">
        <label>First Name</label>
        <div class="iw">
          <i class="bi bi-person"></i>
          <input type="text" id="firstName" placeholder="Arjun"/>
        </div>
      </div>
      <div class="fg">
        <label>Last Name</label>
        <div class="iw">
          <i class="bi bi-person"></i>
          <input type="text" id="lastName" placeholder="Sharma"/>
        </div>
      </div>
    </div>

    <!-- Email -->
    <div class="fg">
      <label>Email Address</label>
      <div class="iw">
        <i class="bi bi-envelope"></i>
        <input type="email" id="email" placeholder="you@example.com"/>
      </div>
    </div>

    <!-- Phone -->
    <div class="fg">
      <label>Phone Number</label>
      <div class="iw">
        <i class="bi bi-telephone"></i>
        <input type="tel" id="phone" placeholder="+91 98765 43210"/>
      </div>
    </div>

    <!-- Password -->
    <div class="fg">
      <label>Password</label>
      <div class="iw">
        <i class="bi bi-lock"></i>
        <input type="password" id="password" placeholder="Min. 8 characters"/>
        <button type="button" class="eye" id="eyePass"><i class="bi bi-eye"></i></button>
      </div>
      <div class="sbar">
        <div class="seg" id="s1"></div><div class="seg" id="s2"></div>
        <div class="seg" id="s3"></div><div class="seg" id="s4"></div>
      </div>
    </div>

    <!-- Confirm Password -->
    <div class="fg">
      <label>Confirm Password</label>
      <div class="iw">
        <i class="bi bi-shield-lock"></i>
        <input type="password" id="confirmPw" placeholder="Repeat password"/>
        <button type="button" class="eye" id="eyeConfirm"><i class="bi bi-eye"></i></button>
      </div>
    </div>

    <!-- Terms -->
    <div class="chk">
      <input type="checkbox" id="terms"/>
      <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
    </div>

    <button type="submit" class="btn-main" id="submitBtn">
      Create Account &nbsp;<i class="bi bi-arrow-right-circle-fill"></i>
    </button>
  </form>


</div>

<div class="toast" id="toast">
  <i class="bi bi-check-circle-fill"></i>
  <span id="toastTxt">Account created!</span>
</div>

<script>
// Submit
document.getElementById('signupForm').addEventListener('submit', function (e) {
  e.preventDefault();

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Creating account…';

  setTimeout(() => {
    localStorage.setItem('spiceUser', JSON.stringify({
      name: document.getElementById('firstName').value + ' ' + document.getElementById('lastName').value,
      email: document.getElementById('email').value,
      password: document.getElementById('password').value
    }));
    const t = document.getElementById('toast');
    document.getElementById('toastTxt').textContent = 'Account created! Redirecting…';
    t.classList.add('show');
    setTimeout(() => window.location.href = 'login.html', 1800);
  }, 1200);
});
</script>
</body>
</html>
